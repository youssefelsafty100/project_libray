{% extends 'web/base.html' %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<h2 class="mb-3">All Records</h2>

<a href="{% url 'create_info' %}" class="btn btn-primary mb-3">
    <i class="fas fa-plus"></i> Add Info
</a>

<form method="get" action="{% url 'search_info' %}" class="mb-3">
    <div class="input-group">
        <input type="text" name="q" class="form-control" placeholder="Search...">
        <button class="btn btn-outline-secondary" type="submit"><i class="fas fa-search"></i></button>
    </div>
</form>

<table class="table table-striped">
    <thead>
        <tr>
            <th>ID</th>
            <th>First Name</th>
            <th>Last Name</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for item in info %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.fName }}</td>
            <td>{{ item.lName }}</td>
            <td>
                <a href="{% url 'view_info_details' item.id %}" class="btn btn-info btn-sm"><i
                        class="fas fa-eye"></i></a>
                <a href="{% url 'update_info' item.id %}" class="btn btn-warning btn-sm"><i class="fas fa-edit"></i></a>
                <a href="{% url 'delete_info' item.id %}" class="btn btn-danger btn-sm"><i class="fas fa-trash"></i></a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
