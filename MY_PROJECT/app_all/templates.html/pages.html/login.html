{% extends 'web/base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<h2 class="mb-4">Login</h2>
<form method="post">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-success"><i class="fas fa-sign-in-alt"></i> Login</button>
</form>
{% endblock %}
